<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aqui é bão, Uai!! - Home</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
            font-weight: 400;
            line-height: 1.6;
            background-color: #f4f4f8;
            color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f9f6f2 0%, #f4f4f8 100%);
        }

        header {
            background: linear-gradient(135deg, #FF0000 0%, #FF0000 100%);
            color: #fff;
            padding: 24px 16px;
            
            position: relative;
        }

        .logo {
            position: absolute;
            top: 10px;
            right: 16px;
            width: 60px;
            height: auto;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 18px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.8rem, 2.5vw, 3rem);
            line-height: 1.1;
            font-family: Georgia, serif;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            transition: background 0.2s ease, transform 0.2s ease;
            font-family: Georgia, serif;
            font-weight: bold;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.32);
            transform: translateY(-1px);
        }

        .header-actions {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .search-box {
            position: relative;
            width: min(100%, 420px);
        }

        .search-box::before {
            content: "\1F50D";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0392b;
            font-size: 1rem;
            pointer-events: none;
        }

        .header-actions input {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px 14px 46px;
            min-width: 220px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border 0.2s ease;
        }

        .header-actions input:focus {
            transform: translateY(-1px);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 0, 0, 0.3);
            background: #fff;
        }

        .filters {
            max-width: 1200px;
            margin: 20px auto 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filters select,
        .filters input {
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            min-width: 220px;
            font-size: 1rem;
            outline: none;
        }

        .filters select {
            background: #fff;
            color: #333;
        }

        .filters input {
            flex: 1;
            min-width: 260px;
            background: #fff;
        }

        main.container {
            max-width: 1200px;
            margin: 36px auto;
            padding: 0 16px;
        }

        main h2 {
            margin-bottom: 24px;
            font-size: clamp(1.6rem, 2vw, 2.4rem);
            color: #FF0000;
        }

        .grid-lojas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .item-card {
            display: block;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 45px rgba(0, 0, 0, 0.12);
        }

        .item-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
        }

        .item-card h3 {
            margin: 0;
            padding: 18px;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
        }

        footer {
            background: #222;
            color: #ddd;
            text-align: center;
            padding: 20px 16px;
            font-size: 0.95rem;
        }

        footer p {
            margin: 8px 0;
        }
    </style>
</head>
