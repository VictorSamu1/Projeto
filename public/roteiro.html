<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Roteiro - Aqui é bão, Uai!!</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <link rel="stylesheet" href="CSS/map.css">
    <link rel="stylesheet" href="CSS/roteiro.css">
</head>
<body>
    <header>
        <img src="imagenslojas/logo.png" alt="Logo" class="logo">
        <div class="header-inner">
            <h1>Aqui é bão, Uai!!</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="noticias.html">Notícias</a>
                <a href="mapa.html">Mapa</a>
                <a href="roteiro.html">Roteiro</a>
            </nav>
            
            <div class="header-actions-map">
                <div class="search-box">
                    <input type="text" id="inputLocalRoteiro" class="search-input" placeholder="1. Onde ir? (Ex: BH...)">
                </div>
                <div class="search-box">
                    <input type="text" id="inputLojaRoteiro" class="search-input" placeholder="2. Qual loja/lugar?">
                </div>
            </div>
        </div>
    </header>

    <main class="container map-container">
        <section class="map-wrapper">
    <div id="meuMapa"></div>
</section>

        <aside class="map-sidebar">
            <div class="sidebar-content" style="margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px;">
                <h3 style="color: #d32f2f;">Seu Roteiro Atual</h3>
                <div id="roteiro-salvo">
                    <p>Carregando do banco de dados...</p>
                </div>
            </div>

            <div class="sidebar-content">
                <h3>Resultados da Busca</h3>
                <ul class="store-list" id="lista-busca-roteiro">
                    <li class="store-item">Use a pesquisa no topo para encontrar um novo local para visitar.</li>
                </ul>
            </div>
        </aside>
    </main>

    <script src="js/roteiro.js"></script>
</body>
</html>
