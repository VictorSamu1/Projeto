<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejar Meu Roteiro - Aqui é bão, Uai!!</title>
    
    <link rel="stylesheet" href="CSS/roteiro.css">
    <link rel="stylesheet" href="CSS/index.css">
</head>
<body>
    <header>
        <img src="imagenslojas/logo.png" alt="Logo" class="logo">
        <div class="header-inner">
            <h1>Aqui é bão, Uai!!</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="noticias.html">Notícias</a>
                <a href="mapa.html">Mapa</a>
                <a href="roteiro.html">Roteiro</a>
            </nav>
        </div>
    </header>

    <main class="painel-roteiro">
        <section class="coluna-esquerda">
            <h3 style="margin-top:0; color: #ff9800;">📍 Locais Salvos do Mapa</h3>
            <p style="font-size: 0.85em; color: gray;">Escolha os lugares aqui para enviar para a div de personalização.</p>
            <div id="lista-locais-salvos">
                </div>
        </section>

        <section class="coluna-direita">
            <h3 style="margin-top:0; color: #333;">
                📅 Cronograma da Viagem 
                <span id="status-modo" class="status-badge badge-visualizar">Visualizando</span>
            </h3>
            
            <div id="area-personalizacao" class="div-personalizacao">
                </div>

           <div class="botoes-controle">
    <button id="btn-voltar-roteiro" class="btn-controle btn-navegacao" onclick="roteiroAnterior()">⬅️ Voltar</button>
    <button id="btn-criar-roteiro" class="btn-controle btn-criar" onclick="criarNovoRoteiro()">➕ Criar Roteiro</button>
    <button id="btn-modo-editar" class="btn-controle btn-editar" onclick="ativarModoEdicao()">✏️ Editar</button>
    <button id="btn-modo-salvar" class="btn-controle btn-salvar" onclick="salvarNoBanco()">💾 Salvar</button>
    <button id="btn-proximo-roteiro" class="btn-controle btn-proximo" onclick="proximoRoteiro()">Próximo ➡️</button>
    <button id="btn-modo-apagar" class="btn-controle btn-apagar" onclick="limparRoteiroCompleto()">🗑️ Apagar</button>
</div>
        </section>
    </main>

    <script src="js/roteiro.js"></script>
</body>
</html>
