<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - Aqui é bão, Uai!!</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/map.css">
</head>
<body>
    <header class="main-header">
        <h1>Explore o Mapa</h1>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="noticias.html">Notícias</a>
            <a href="mapa.html">Mapa</a>
        </nav>
    </header>

    <main class="map-container">
        <section class="map-wrapper">
            <div id="meuMapa"></div>
        </section>

        <aside class="map-sidebar">
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.85em; font-weight: bold; color: #555; margin-bottom: 5px; display: block;">1. Onde você está?</label>
                <input type="text" id="inputLocal" class="search-input" placeholder="Ex: Av. Afonso Pena, BH... (Aperte Enter)">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.85em; font-weight: bold; color: #555; margin-bottom: 5px; display: block;">2. O que procura?</label>
                <input type="text" id="inputLoja" class="search-input" placeholder="Ex: Padaria, Farmácia... (Aperte Enter)">
            </div>
            
            <div class="sidebar-content">
                <h3>Lojas Próximas</h3>
                <ul class="store-list">
                    <li class="store-item">
                        <span>Use o mapa para explorar</span>
                    </li>
                </ul>
            </div>
        </aside>
    </main>

    <script src="js/mapa.js"></script>
</body>
</html>
